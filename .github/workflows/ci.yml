name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # Type check (PrIM has no test suite; lint == tsc --noEmit).
      - run: npm run lint

      # Ensure the production bundle builds.
      - run: npm run build
