name: Deploy to Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:

# Required for keyless auth to GCP via Workload Identity Federation.
permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SA }}

      - uses: google-github-actions/setup-gcloud@v2

      # Builds the Dockerfile via Cloud Build, pushes to Artifact Registry,
      # and deploys to Cloud Run. PrIM is a static SPA served by nginx, so
      # there are no runtime secrets or env vars to wire up.
      - name: Deploy
        run: |
          gcloud run deploy "${{ vars.CLOUD_RUN_SERVICE }}" \
            --source . \
            --project "${{ vars.GCP_PROJECT_ID }}" \
            --region "${{ vars.GCP_REGION }}" \
            --allow-unauthenticated \
            --memory 256Mi \
            --cpu 1 \
            --port 8080

      - name: Show service URL
        run: |
          gcloud run services describe "${{ vars.CLOUD_RUN_SERVICE }}" \
            --project "${{ vars.GCP_PROJECT_ID }}" \
            --region "${{ vars.GCP_REGION }}" \
            --format='value(status.url)'
