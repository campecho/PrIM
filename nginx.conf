# Rendered by the nginx image's envsubst entrypoint; ${PORT} is replaced
# with Cloud Run's injected port at container start.
server {
    listen       ${PORT};
    listen       [::]:${PORT};
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Gzip text assets on the fly.
    gzip            on;
    gzip_types      text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Fingerprinted Vite assets are immutable; cache them aggressively.
    location /assets/ {
        expires    1y;
        add_header Cache-Control "public, immutable";
        try_files  $uri =404;
    }

    # SPA fallback: serve index.html for any unmatched route so client-side
    # navigation works on hard refresh / deep links.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
